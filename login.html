<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UU Gym | Log In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="login">
  <div id="navbar-placeholder"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-3">Member Log In</h1>
            <p class="text-secondary small">Template form. You can replace the fields/validation rules later.</p>
            <form id="loginForm" novalidate>
              <div class="mb-3">
                <label class="form-label" for="loginEmail">Email</label>
                <input class="form-control" id="loginEmail" name="email" type="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="loginPassword">Password</label>
                <input class="form-control" id="loginPassword" name="password" type="password" required>
              </div>
              <button class="btn btn-primary w-100" type="submit">Log In</button>
              <div class="form-text mt-2 js-login-message"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
