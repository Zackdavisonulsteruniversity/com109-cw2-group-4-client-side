<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>UU Gym | Log In</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
        <link rel="stylesheet" href="assets/css/global.css">
        <link rel="stylesheet" href="assets/css/styles.css">
        <link rel="stylesheet" href="assets/css/authentication.css">
        <script src="assets/js/auth/auth.js" defer></script>
    </head>
    <body data-page="login">

        <div id="navbar-placeholder"></div>

        <main
            class="container auth-wrapper my-4">
            <div class="authentication-form-container">

                <div class="authentication-form-header">
                    <h3>Welcome Back</h3>
                    <p class="text-muted small mt-1">Log in to manage your
                        workouts and account</p>
                </div>

                <form id="login-form" name="login-form"
                    onsubmit="loginUser(event)">
                    <div class="vstack gap-3">
                        <div>
                            <input type="text" id="login-username"
                                class="form-control" placeholder="Username"
                                required>
                        </div>
                        <div>
                            <input type="password" id="login-password"
                                class="form-control" placeholder="Password"
                                required>
                        </div>

                        <div class="forgot-password">
                            <a href="#">Forgot password?</a>
                        </div>

                        <div>
                            <button class="submit-btn" id="log-in-button"
                                type="submit">LOG IN</button>
                        </div>
                    </div>
                </form>

                <div class="signup">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>

            </div>
        </main>

        <div id="footer-placeholder"></div>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="assets/js/main.js"></script>
    </body>
</html>
