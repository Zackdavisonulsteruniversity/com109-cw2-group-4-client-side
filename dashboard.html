<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UU Gym | Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="dashboard">
  <div id="navbar-placeholder"></div>

  <main class="container py-5">
    <h1 class="h3">Welcome, <span class="js-dashboard-name">Member</span></h1>
    <p class="text-secondary">This is a placeholder dashboard for signed-in users.</p>

    <div class="row g-4 mt-1">
      <div class="col-md-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h2 class="h5">Your Membership</h2>
            <p class="mb-1 d-flex align-items-center gap-2">
              <strong>Plan:</strong> <span class="js-dashboard-plan">Not set</span>
              <!-- delete the plan if the user wants to change it (hidden if user has no active membership)-->
              <button class="btn btn-sm btn-outline-danger d-none js-cancel-plan" type="button">Cancel</button>
            </p>
            <p class="mb-0"><strong>Student ID:</strong> <span class="js-dashboard-student-id">Not set</span></p>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h2 class="h5">Update Contact Details</h2>
            <form id="contactForm" novalidate>
              <div class="mb-3">
                <label class="form-label" for="contactPhone">Phone</label>
                <input class="form-control" id="contactPhone" name="phone" type="tel">
              </div>
              <div class="mb-3">
                <label class="form-label" for="contactEmergency">Emergency contact</label>
                <input class="form-control" id="contactEmergency" name="emergencyContact" type="text">
              </div>
              <button class="btn btn-primary" type="submit">Save Profile</button>
              <div class="form-text mt-2 js-contact-message"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
