<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UU Gym | Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body data-page="signup">
  <div id="navbar-placeholder"></div>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h1 class="h4 mb-3">Create Your Gym Account</h1>
            <p class="text-secondary small">Template membership form saved in localStorage.</p>
            <form id="signupForm" class="row g-3" novalidate>
              <div class="col-md-6">
                <label class="form-label" for="signupFirstName">First name</label>
                <input class="form-control" id="signupFirstName" name="firstName" type="text" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="signupLastName">Last name</label>
                <input class="form-control" id="signupLastName" name="lastName" type="text" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="signupEmail">Email</label>
                <input class="form-control" id="signupEmail" name="email" type="email" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="signupStudentId">Student ID</label>
                <input class="form-control" id="signupStudentId" name="studentId" type="text" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="signupPassword">Password</label>
                <input class="form-control" id="signupPassword" name="password" type="password" minlength="6" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" for="signupPlan">Membership plan</label>
                <select class="form-select" id="signupPlan" name="plan" required>
                  <option value="">Select a plan</option>
                  <option>Student Standard</option>
                  <option>Student Plus</option>
                  <option>Staff Membership</option>
                </select>
              </div>
              <div class="col-12">
                <div class="form-check">
                  <input class="form-check-input" id="signupTerms" name="terms" type="checkbox" required>
                  <label class="form-check-label" for="signupTerms">I agree to the placeholder gym terms.</label>
                </div>
              </div>
              <div class="col-12">
                <button class="btn btn-primary" type="submit">Create Account</button>
                <div class="form-text mt-2 js-signup-message"></div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
